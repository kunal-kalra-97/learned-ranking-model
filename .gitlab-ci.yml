image: python:3.12

stages:
  - evaluation

variables:
  GIT_STRATEGY: fetch

run_model_evaluation:
  stage: evaluation
  tags:
      - aidm-0
  only:
    refs:
      - main
  before_script:
    - pip3 install uv
    - uv venv
  script:
    - echo "Evaluating Cost Models"
    - source .venv/bin/activate
    - uv pip install -r requirements.txt
    - cp -r /tmp/eval_dir/* .
    # Extract features from the unseen test set
    - python3 feature_extraction.py --file_path workload_test.json --output_path test_features.json
    # Evaluate the model given the extracted features against the unseen labels
    - python3 evaluate_leaderboard.py --test_data test_features.json
  timeout: 7 minutes